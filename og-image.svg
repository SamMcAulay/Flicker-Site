<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0d1a"/>
      <stop offset="100%" stop-color="#111425"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#232847" stroke-width="1" opacity="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="#5b8ef7"/>

  <!-- Lightning bolt -->
  <g transform="translate(110, 180)" filter="url(#glow)">
    <polygon points="110,0 40,130 90,130 80,230 160,100 110,100" fill="#5b8ef7" opacity="0.15"/>
    <polygon points="100,10 34,130 82,130 72,220 150,100 102,100" fill="#5b8ef7"/>
  </g>

  <!-- FLICKER wordmark -->
  <text x="310" y="310"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="148"
    letter-spacing="18"
    fill="#e2e8f8">FLICKER</text>

  <!-- Tagline -->
  <text x="312" y="375"
    font-family="Arial, sans-serif"
    font-weight="300"
    font-size="30"
    letter-spacing="4"
    fill="#7b8fc0">DISCORD BOT  ·  ECONOMY  ·  EVENTS  ·  GAMES</text>

  <!-- Bottom domain -->
  <text x="312" y="510"
    font-family="Courier New, monospace"
    font-size="22"
    fill="#3a4580"
    letter-spacing="2">flicker-bot.com</text>

  <!-- Right decorative dots -->
  <g fill="#5b8ef7" opacity="0.25">
    <rect x="1090" y="200" width="5" height="5" rx="1"/>
    <rect x="1106" y="200" width="5" height="5" rx="1"/>
    <rect x="1122" y="200" width="5" height="5" rx="1"/>
    <rect x="1090" y="216" width="5" height="5" rx="1"/>
    <rect x="1106" y="216" width="5" height="5" rx="1"/>
    <rect x="1122" y="216" width="5" height="5" rx="1"/>
    <rect x="1090" y="232" width="5" height="5" rx="1"/>
    <rect x="1106" y="232" width="5" height="5" rx="1"/>
    <rect x="1122" y="232" width="5" height="5" rx="1"/>
  </g>
</svg>
