<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flicker — Admin</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="css/style.css?v=7">
  <style>
    /* ── Admin-specific overrides ─────────────────── */
    .admin-layout {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Guild list sidebar */
    .guild-sidebar {
      width: 280px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .guild-sidebar-header {
      padding: 20px 16px 14px;
      border-bottom: 1px solid var(--border);
    }

    .guild-sidebar-header .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .guild-sidebar-header .brand-bolt {
      font-size: 1.2rem;
    }

    .guild-sidebar-header .brand-name {
      font-family: var(--font-brand);
      font-size: 1.4rem;
      letter-spacing: 0.12em;
      color: var(--text);
    }

    .admin-badge {
      display: inline-block;
      background: rgba(251, 191, 36, 0.15);
      border: 1px solid rgba(251, 191, 36, 0.35);
      color: var(--warn);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 20px;
    }

    .guild-search {
      margin-top: 10px;
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 0.82rem;
      padding: 6px 10px;
      outline: none;
      transition: border-color 0.15s;
    }

    .guild-search:focus { border-color: var(--accent); }
    .guild-search::placeholder { color: var(--text-3); }

    .guild-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .guild-list::-webkit-scrollbar { width: 4px; }
    .guild-list::-webkit-scrollbar-track { background: transparent; }
    .guild-list::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }

    .guild-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      cursor: pointer;
      transition: background 0.12s;
      border-left: 3px solid transparent;
    }

    .guild-item:hover { background: var(--surface-2); }
    .guild-item.active {
      background: var(--accent-dim);
      border-left-color: var(--accent);
    }

    .guild-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .guild-icon-placeholder {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--surface-3);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-2);
      flex-shrink: 0;
    }

    .guild-item-info { flex: 1; min-width: 0; }

    .guild-item-name {
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .guild-item-meta {
      font-size: 0.72rem;
      color: var(--text-2);
      margin-top: 1px;
    }

    .guild-disabled-pill {
      font-size: 0.65rem;
      background: var(--danger-dim);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: var(--danger);
      padding: 1px 6px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .guild-sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }

    /* Main detail panel */
    .admin-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .admin-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .admin-header h1 {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      flex: 1;
    }

    .admin-body {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
    }

    .admin-body::-webkit-scrollbar { width: 6px; }
    .admin-body::-webkit-scrollbar-track { background: transparent; }
    .admin-body::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }

    /* Empty / loading state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--text-2);
    }

    .empty-state .empty-icon { font-size: 2.8rem; }
    .empty-state p { font-size: 0.9rem; }

    /* Guild detail */
    .detail-guild-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .detail-guild-header img,
    .detail-guild-header .guild-icon-placeholder {
      width: 52px;
      height: 52px;
      font-size: 1.1rem;
    }

    .detail-guild-header h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
    }

    .detail-guild-header .meta {
      font-size: 0.8rem;
      color: var(--text-2);
      margin-top: 2px;
    }

    /* Control row */
    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      margin-bottom: 20px;
    }

    .control-row-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
    }

    .control-row-desc {
      font-size: 0.78rem;
      color: var(--text-2);
      margin-top: 2px;
    }

    /* Danger toggle */
    .toggle-danger {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-2);
      cursor: pointer;
      user-select: none;
    }

    .toggle-danger input { display: none; }

    .toggle-danger-track {
      width: 42px;
      height: 22px;
      background: var(--surface-3);
      border: 1px solid var(--border-2);
      border-radius: 11px;
      position: relative;
      transition: background 0.2s, border-color 0.2s;
    }

    .toggle-danger-track::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--text-3);
      transition: transform 0.2s, background 0.2s;
    }

    .toggle-danger input:checked + .toggle-danger-track {
      background: var(--danger-dim);
      border-color: var(--danger);
    }

    .toggle-danger input:checked + .toggle-danger-track::after {
      transform: translateX(20px);
      background: var(--danger);
    }

    /* Section header */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-2);
    }

    /* Users table */
    .users-table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .users-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.83rem;
    }

    .users-table th {
      background: var(--surface-2);
      color: var(--text-2);
      font-weight: 600;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 9px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .users-table td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      vertical-align: middle;
    }

    .users-table tr:last-child td { border-bottom: none; }
    .users-table tr:hover td { background: var(--surface-2); }

    .user-cell {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
    }

    .user-avatar-placeholder {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--surface-3);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--text-2);
      flex-shrink: 0;
    }

    .user-name { font-weight: 500; }
    .user-id { font-size: 0.7rem; color: var(--text-2); font-family: var(--font-mono); }

    .balance-cell {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: var(--accent-bright);
    }

    /* Inline edit inputs */
    .balance-input {
      width: 90px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.82rem;
      padding: 4px 8px;
      outline: none;
      transition: border-color 0.15s;
    }

    .balance-input:focus { border-color: var(--accent); }

    .btn-save-row {
      background: var(--accent-dim);
      border: 1px solid var(--accent-line);
      color: var(--accent-bright);
      border-radius: var(--radius-sm);
      padding: 4px 10px;
      font-size: 0.78rem;
      font-family: var(--font-ui);
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-save-row:hover { background: rgba(91, 142, 247, 0.22); }
    .btn-save-row:disabled { opacity: 0.4; cursor: default; }

    .saved-flash {
      color: var(--success);
      font-size: 0.75rem;
      font-weight: 600;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .stat-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 16px;
      flex: 1;
      min-width: 120px;
    }

    .stat-chip-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-2);
      font-weight: 600;
    }

    .stat-chip-value {
      font-size: 1.2rem;
      font-family: var(--font-brand);
      letter-spacing: 0.05em;
      color: var(--text);
      margin-top: 2px;
    }

    /* Loading spinner (reuse from main styles) */
    .table-loading {
      padding: 32px;
      text-align: center;
      color: var(--text-2);
      font-size: 0.85rem;
    }

    .user-search {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 0.82rem;
      padding: 6px 10px;
      outline: none;
      transition: border-color 0.15s;
      width: 220px;
    }

    .user-search:focus { border-color: var(--accent); }
    .user-search::placeholder { color: var(--text-3); }

    /* Logout */
    .btn-logout-admin {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-2);
      border-radius: var(--radius);
      padding: 6px 12px;
      font-size: 0.78rem;
      font-family: var(--font-ui);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-logout-admin:hover { border-color: var(--danger); color: var(--danger); }

    .loading-row td { text-align: center; color: var(--text-2); padding: 24px; }
  </style>
</head>
<body>

  <canvas id="starfield"></canvas>

  <div class="admin-layout">

    <!-- ── Guild Sidebar ────────────────────────────── -->
    <aside class="guild-sidebar">
      <div class="guild-sidebar-header">
        <div class="brand">
          <span class="brand-bolt">⚡</span>
          <span class="brand-name">FLICKER</span>
          <span class="admin-badge">ADMIN</span>
        </div>
        <input type="text" id="guild-search" class="guild-search" placeholder="Search servers…">
      </div>

      <div id="guild-list" class="guild-list">
        <div style="padding: 24px 16px; color: var(--text-2); font-size: 0.82rem;">Loading…</div>
      </div>

      <div class="guild-sidebar-footer">
        <button id="logout-btn" class="btn-logout-admin">↩ Log out</button>
      </div>
    </aside>

    <!-- ── Main Detail Panel ─────────────────────────── -->
    <main class="admin-main">
      <header class="admin-header">
        <h1 id="detail-heading">Admin Dashboard</h1>
        <a href="/dashboard" style="font-size:0.8rem; color:var(--text-2); text-decoration:none;">← Server Dashboard</a>
      </header>

      <div class="admin-body" id="admin-body">
        <div class="empty-state">
          <span class="empty-icon">⚡</span>
          <p>Select a server to manage it.</p>
        </div>
      </div>
    </main>

  </div>

  <script src="js/config.js?v=7"></script>
  <script src="js/auth.js?v=7"></script>
  <script src="js/admin.js?v=7"></script>
</body>
</html>
