<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flicker — Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Flicker">
  <meta property="og:title" content="Flicker — Server Dashboard">
  <meta property="og:description" content="Manage your Flicker bot settings, toggles, economy, and auto-responder for your Discord server.">
  <meta property="og:url" content="https://flicker-bot.com/dashboard">
  <meta property="og:image" content="https://flicker-bot.com/og-image.svg">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="stylesheet" href="css/style.css?v=9">
</head>
<body>

  <canvas id="starfield"></canvas>

  <div class="dashboard-layout">

    <!-- ── Sidebar ─────────────────────────────────── -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-brand">
          <span class="sidebar-bolt">⚡</span>
          <span class="sidebar-name">FLICKER</span>
        </div>

        <p class="guild-label">Server</p>
        <select id="guild-selector" class="guild-selector">
          <option value="">Loading servers…</option>
        </select>
      </div>

      <nav class="sidebar-nav">
        <p class="nav-section-label">Navigation</p>

        <a href="/guide" class="nav-tab" style="text-decoration:none;">
          <span class="nav-icon">&#128218;</span>
          <span class="nav-label">Command Guide</span>
        </a>

        <p class="nav-section-label" style="margin-top:6px;">Settings</p>

        <button class="nav-tab active" data-tab="toggles">
          <span class="nav-icon">⚡</span>
          <span class="nav-label">Toggles</span>
        </button>

        <button class="nav-tab" data-tab="economy">
          <span class="nav-icon">💰</span>
          <span class="nav-label">Economy</span>
        </button>

        <button class="nav-tab" data-tab="responder">
          <span class="nav-icon">💬</span>
          <span class="nav-label">Auto-Responder</span>
        </button>

        <button class="nav-tab" data-tab="eventtext">
          <span class="nav-icon">✏️</span>
          <span class="nav-label">Event Text</span>
        </button>

        <button class="nav-tab" data-tab="welcome">
          <span class="nav-icon">👋</span>
          <span class="nav-label">Welcome</span>
        </button>

        <button class="nav-tab" data-tab="leveling">
          <span class="nav-icon">⭐</span>
          <span class="nav-label">Leveling</span>
        </button>

        <button class="nav-tab" data-tab="reaction-roles">
          <span class="nav-icon">🎭</span>
          <span class="nav-label">Reaction Roles</span>
        </button>

        <button class="nav-tab" data-tab="tickets">
          <span class="nav-icon">🎫</span>
          <span class="nav-label">Tickets</span>
        </button>

        <button class="nav-tab" data-tab="profile">
          <span class="nav-icon">🤖</span>
          <span class="nav-label">Bot Profile</span>
        </button>
      </nav>

      <div class="sidebar-bottom">
        <span id="status" class="status loading">Connecting…</span>
        <button id="logout-btn" class="btn-logout">
          <span>↩</span> Log out
        </button>
      </div>
    </aside>

    <!-- ── Main ────────────────────────────────────── -->
    <main class="main">
      <header class="main-header">
        <button id="menu-toggle" class="menu-toggle" aria-label="Open menu">☰</button>
        <h1 id="tab-heading">Toggles</h1>
        <a id="invite-btn" class="btn-invite" target="_blank" rel="noopener">+ Add to Server</a>
        <button id="save-btn" class="btn-save" disabled>Save Changes</button>
      </header>

      <div class="main-body">

        <!-- Invite panel (shown when user admins no servers with Flicker) -->
        <div id="invite-panel" class="invite-panel" hidden>
          <div class="invite-card">
            <span class="invite-bolt">⚡</span>
            <h2 class="invite-title">No Servers Found</h2>
            <p class="invite-desc">
              Flicker isn't in any servers you manage yet.<br>
              Invite it to a server to unlock the control panel.
            </p>
            <a id="invite-hero-btn" class="btn-invite-hero" target="_blank" rel="noopener">
              + Invite Flicker to a Server
            </a>
          </div>
        </div>

        <!-- Loading overlay -->
        <div id="loading-overlay">
          <div class="loading-spinner"></div>
        </div>

        <!-- ── Toggles Tab ────────────────────────── -->
        <div id="tab-toggles" class="tab-panel active">
          <div class="toggles-sections">
            <div class="toggle-section" id="section-games"></div>
            <div class="toggle-section" id="section-events"></div>
            <div class="toggle-section" id="section-commands"></div>
          </div>
        </div>

        <!-- ── Economy Tab ────────────────────────── -->
        <div id="tab-economy" class="tab-panel">
          <!-- rendered by dashboard.js -->
        </div>

        <!-- ── Auto-Responder Tab ─────────────────── -->
        <div id="tab-responder" class="tab-panel">
          <!-- rendered by dashboard.js -->
        </div>

        <!-- ── Event Text Tab ───────────────────── -->
        <div id="tab-eventtext" class="tab-panel">
          <!-- rendered by dashboard.js -->
        </div>

        <!-- ── Welcome Tab ──────────────────────── -->
        <div id="tab-welcome" class="tab-panel">
          <!-- rendered by dashboard.js -->
        </div>

        <!-- ── Leveling Tab ──────────────────────── -->
        <div id="tab-leveling" class="tab-panel">
          <!-- rendered by dashboard.js -->
        </div>

        <!-- ── Reaction Roles Tab ──────────────────── -->
        <div id="tab-reaction-roles" class="tab-panel">
          <!-- rendered by dashboard.js -->
        </div>

        <!-- ── Tickets Tab ──────────────────────── -->
        <div id="tab-tickets" class="tab-panel">
          <!-- rendered by dashboard.js -->
        </div>

        <!-- ── Bot Profile Tab ──────────────────── -->
        <div id="tab-profile" class="tab-panel">
          <!-- rendered by dashboard.js -->
        </div>

      </div><!-- /main-body -->
    </main>

  </div><!-- /dashboard-layout -->

  <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

  <script src="js/config.js?v=10"></script>
  <script src="js/auth.js?v=10"></script>
  <script src="js/api.js?v=10"></script>
  <script src="js/dashboard.js?v=10"></script>
</body>
</html>
